<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PartPilot{% endblock %}</title>
  <style>
    :root {
      --bg:#0f1419; --panel:#1a2330; --line:#2a3646; --fg:#e6edf3; --muted:#8b98a8;
      --accent:#3b82f6; --ok:#16a34a; --warn:#d97706; --bad:#dc2626; --stock:#0891b2;
    }
    * { box-sizing:border-box; }
    body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;
           background:var(--bg); color:var(--fg); }
    header { display:flex; align-items:center; gap:.75rem; padding:.7rem 1.25rem;
             background:var(--panel); border-bottom:1px solid var(--line); }
    header .brand { font-weight:700; letter-spacing:.3px; }
    header .brand span { color:var(--accent); }
    header .spacer { flex:1; }
    header .who { color:var(--muted); font-size:.9rem; }
    .role { background:var(--line); color:var(--fg); border-radius:999px;
            padding:.05rem .55rem; font-size:.75rem; text-transform:uppercase; letter-spacing:.4px; }
    main { max-width:1200px; margin:0 auto; padding:1.5rem 1.25rem; }
    a { color:var(--accent); }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px;
             padding:1.25rem 1.4rem; }
    h1 { font-size:1.4rem; margin:.2rem 0 1rem; }
    label { display:block; font-size:.85rem; color:var(--muted); margin:.9rem 0 .3rem; }
    input[type=text], input[type=password], input[type=number], input[type=file] {
      width:100%; padding:.55rem .65rem; background:#0d1219; color:var(--fg);
      border:1px solid var(--line); border-radius:7px; }
    .check { display:flex; align-items:center; gap:.5rem; margin-top:1rem; color:var(--fg); }
    .check input { width:auto; }
    button { margin-top:1.2rem; padding:.6rem 1.2rem; background:var(--accent); color:#fff;
             border:0; border-radius:7px; font-weight:600; cursor:pointer; }
    button.ghost { background:transparent; border:1px solid var(--line); color:var(--fg);
                   margin:0; padding:.3rem .7rem; font-weight:500; }
    .err { background:#3a1418; border:1px solid var(--bad); color:#ffb4b4;
           padding:.6rem .8rem; border-radius:7px; margin-bottom:1rem; }
    .note { color:var(--muted); font-size:.9rem; }
    .cards { display:flex; flex-wrap:wrap; gap:.75rem; margin:.5rem 0 1.25rem; }
    .card { background:#0d1219; border:1px solid var(--line); border-radius:9px;
            padding:.6rem 1rem; min-width:120px; }
    .card b { display:block; font-size:1.5rem; }
    .card small { color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-size:.7rem; }
    table { width:100%; border-collapse:collapse; font-size:.86rem; }
    th, td { text-align:left; padding:.4rem .55rem; border-bottom:1px solid var(--line);
             vertical-align:top; }
    th { color:var(--muted); font-weight:600; position:sticky; top:0; background:var(--panel); }
    tr:hover td { background:#141d29; }
    .num { text-align:right; font-variant-numeric:tabular-nums; }
    .badge { border-radius:999px; padding:.05rem .5rem; font-size:.72rem; font-weight:600;
             text-transform:uppercase; letter-spacing:.3px; white-space:nowrap; }
    .badge.ok{background:rgba(22,163,74,.18);color:#5fe39b;}
    .badge.warn{background:rgba(217,119,6,.18);color:#f3c06b;}
    .badge.bad{background:rgba(220,38,38,.18);color:#ff9a9a;}
    .badge.stock{background:rgba(8,145,178,.18);color:#67d8ec;}
    .badge.muted{background:var(--line);color:var(--muted);}
    .downloads a { display:inline-block; margin-right:.6rem; margin-top:.4rem; padding:.4rem .8rem;
                   background:#0d1219; border:1px solid var(--line); border-radius:7px; }
    .flag { color:var(--muted); font-size:.8rem; }
    #overlay { position:fixed; inset:0; background:rgba(8,12,18,.82); display:none;
               align-items:center; justify-content:center; flex-direction:column; gap:1rem; z-index:50; }
    #overlay .spin { width:42px; height:42px; border:4px solid var(--line);
                     border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div class="brand">Part<span>Pilot</span></div>
    <div class="spacer"></div>
    {% if user %}
      <span class="who">{{ user.username }}</span>
      <span class="role">{{ user.role }}</span>
      <form method="post" action="/logout" style="margin:0">
        <button class="ghost" type="submit">Log out</button>
      </form>
    {% endif %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
