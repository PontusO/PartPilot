{% extends "base.html" %}
{% block title %}Change password · PartPilot{% endblock %}
{% block content %}
<div class="panel" style="max-width:460px;">
  <h1>Change my password</h1>
  <p class="note">Signed in as <b>{{ current_user.full_name or current_user.username }}</b>.</p>

  {% if saved %}<div style="background:rgba(70,180,120,.15); border:1px solid var(--ok);
       border-radius:9px; padding:.6rem .9rem; margin:1rem 0;">Password changed.</div>{% endif %}
  {% if error %}<div class="err" style="margin:1rem 0;">{{ error }}</div>{% endif %}

  <form method="post" action="/account/password">
    <label for="current">Current password</label>
    <input id="current" name="current" type="password" autocomplete="current-password" required autofocus>
    <label for="new_password">New password</label>
    <input id="new_password" name="new_password" type="password" autocomplete="new-password" required>
    <label for="confirm">Confirm new password</label>
    <input id="confirm" name="confirm" type="password" autocomplete="new-password" required>
    <div style="margin-top:1.2rem;"><button type="submit">Change password</button></div>
  </form>
</div>
{% endblock %}
